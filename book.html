<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seat Selection - SwiftRide Tanzania</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .booking-main { padding-top: 100px; padding-bottom: 3rem; background: var(--bg-dark); }
        .booking-content { max-width: 1200px; margin: 2rem auto; padding: 0 5%; display: grid; grid-template-columns: 1fr 1.5fr; gap: 4rem; }
        
        .seat-map { background: var(--bg-card); border-radius: 30px; border: 1px solid var(--glass-border); padding: 3rem; text-align: center; }
        .bus-layout { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; max-width: 300px; margin: 0 auto; position: relative; }
        .seat { width: 45px; height: 45px; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; transition: background 0.3s; }
        .seat:hover { background: rgba(99, 102, 241, 0.2); }
        .seat.selected { background: var(--primary); color: white; border-color: var(--primary); }
        .seat.unavailable { background: rgba(0,0,0,0.4); cursor: not-allowed; opacity: 0.5; color: #444; }
        .aisle { width: 45px; height: 45px; }

        .form-card { background: var(--bg-card); border-radius: 30px; border: 1px solid var(--glass-border); padding: 3rem; }
        .legend { display: flex; justify-content: center; gap: 1.5rem; margin-top: 2rem; font-size: 0.9rem; color: var(--text-muted); }
        .legend-item { display: flex; align-items: center; gap: 0.5rem; }
        .legend-box { width: 15px; height: 15px; border-radius: 3px; }
    </style>
</head>
<body class="booking-main">
    <nav id="navbar" class="scrolled">
        <a href="index.html" class="logo">
            <i class="fa-solid fa-bus-simple"></i> SwiftRide
        </a>
        <div class="nav-container">
            <ul class="nav-links" id="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="routes.html">Travel Routes</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li id="auth-nav"><a href="login.html" class="btn btn-primary">Login</a></li>
            </ul>
            <button class="mobile-menu-btn" id="mobile-menu-btn">
                <i class="fa-solid fa-bars"></i>
            </button>
        </div>
    </nav>

    <main class="booking-content">
        <div class="seat-map fade-in">
            <h2 style="margin-bottom: 2rem;">Select Your Seat</h2>
            <div style="background: #1e293b; padding: 10px; border-radius: 10px; margin-bottom: 2rem; color: #94a3b8; font-size: 0.8rem;">Front of Bus</div>
            <div class="bus-layout" id="seat-container">
                <!-- Seats generated by JS -->
            </div>
            <div class="legend">
                <div class="legend-item"><div class="legend-box" style="background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border);"></div> Available</div>
                <div class="legend-item"><div class="legend-box" style="background: var(--primary);"></div> Selected</div>
                <div class="legend-item"><div class="legend-box" style="background: rgba(0,0,0,0.4);"></div> Booked</div>
            </div>
        </div>

        <div class="form-card fade-in" style="animation-delay: 0.2s;">
            <h2 style="margin-bottom: 2rem;">Passenger Details</h2>
            <form id="booking-form">
                <div style="background: var(--glass); padding: 1.5rem; border-radius: 20px; margin-bottom: 2rem; border-left: 4px solid var(--primary);">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <span style="color: var(--text-muted);">Selected Seat:</span>
                        <span id="selected-seat-num" style="font-size: 1.5rem; font-weight: 700; color: var(--primary);">None</span>
                    </div>
                </div>

                <div class="input-group" style="margin-bottom: 1.5rem;">
                    <label>Full Name</label>
                    <input type="text" id="pass-name" placeholder="Entry Your Full Name" required style="width: 100%;">
                </div>
                <div class="input-group" style="margin-bottom: 1.5rem;">
                    <label>Phone Number (for Mobile Money)</label>
                    <input type="tel" id="pass-phone" placeholder="+255 7XX XXX XXX" required style="width: 100%;">
                </div>
                <div class="input-group" style="margin-bottom: 2rem;">
                    <label>ID / Passport Number</label>
                    <input type="text" id="pass-id" placeholder="Document ID" required style="width: 100%;">
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; padding: 1.2rem; font-size: 1.1rem;" id="proceed-btn">
                    Proceed to Payment <i class="fa-solid fa-arrow-right" style="margin-left: 10px;"></i>
                </button>
            </form>
        </div>
    </main>

    <script src="assets/js/main.js"></script>
    <script src="assets/js/booking.js"></script>
</body>
</html>
